<!DOCTYPE html>
<html lang="pt-br">
       <!--A tag head serve como cabeçalho do documento-->
<head>
       <!--A tag com o charset detemina quais caracteres são válidos-->
       <meta charset="UTF-8">
       <meta name="viewport" content="width=device-width, initial-scale=1.0">
       <title>Minha Primeira Página</title>
       <!--Para comenta o código-->
       <!--A tag link serve para relacionar o arquivo de estilização com HTML-->
       <link rel="stylesheet" href="style.css">
</head>
<!--A tag body é a tag correspodente ao corpo da aplicação-->
<body>
       <!--Cabeçalho da aplicação-->
       <head class="cabeçalho">
              <h1>Bem-Vindo a minha primeira página HTML</h1>
              <p>Aprendendo pouco mais a cada dia!</p>

       </head>

       <!--A tag main representa o conteúdo principal-->
       <main class="Conteudo">

              <!--A tag section representa como criar uma seção no conteúdo-->
              <section class="card">
                     <h2>Titulos (do H1 até o h6)</h2>
                     <p>Os Titulos criam uma hieraquia no contéudo, veja abaixo</p>

                     <h1>h1 - Título principal</h1>
                     <h2>h2 - Subtítulo</h2>
                     <h3>h3 - Seção</h3>
                     <h4>h4 - Sub-sesão</h4>
                     <h5>h5 - Menor título</h5>
                     <h6>h6 - O menor de todos</h6>
                     

              </section>

       </main>


       
</body>
</html>
